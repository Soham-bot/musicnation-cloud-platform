# ─────────────────────────────────────────────────────────
# MusicNation Cloud Platform — Multi-Container Environment
# Services: Flask API + MySQL Database + Nginx
# ─────────────────────────────────────────────────────────

services:

  # ── Flask Backend API ──────────────────────────────────
  api:
    build: .
    container_name: musicnation-api
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=musicnation
      - MYSQL_PASSWORD=musicnation123
      - MYSQL_DB=musicnation_db
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app
    networks:
      - musicnation-net

  # ── MySQL Database ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: musicnation-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: musicnation_db
      MYSQL_USER: musicnation
      MYSQL_PASSWORD: musicnation123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "musicnation", "-pmusicnation123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - musicnation-net

  # ── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: musicnation-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api
    networks:
      - musicnation-net

# ── Volumes ────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Networks ───────────────────────────────────────────
networks:
  musicnation-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
